        Rutherford vékony aranyfóliát bombázott radioaktív forrásból származó, pozitív töltésű, nehéz $\\alpha$-részecskékkel (héliummagokkal).<br><br>

        $$L = m_{\\text{e}} \\cdot v \\cdot r = n \\cdot \\frac{h}{2\\pi} \\quad (n = 1, 2, 3, \\dots)$$

        $$\\Delta E = E_2 - E_1 = h \\cdot f$$

      </div>
      <div class="block thm">
        <div class="step-label">De Broglie-féle anyaghullámok (1924)</div>

        $$\\lambda = \\frac{h}{p} = \\frac{h}{m \\cdot v}$$
        <b>Kísérleti igazolás:</b> Davisson és Germer elektronnyaláb kristályrácson történő elhajlásával (diffrakció) bizonyították az elektron hullámtermészetét. Ezen alapul az elektronmikroszkóp, mely a fény hullámhosszánál sokkal kisebb de Broglie-hullámhossz miatt hatalmas felbontásra képes.

        Az atommag keletkezése során ez a tömeghiány energiaként sugárzódik ki Einstein tömeg-energia ekvivalenciája szerint ($\\Delta E = \\Delta m \\cdot c^2$). Ugyanilyen nagyságú energia befektetése szükséges a mag szabad nukleonokra történő szétszedéséhez. Ez a <b>kötési energia</b> ($E_{\\text{k}}$):

        1. <i>Üzemanyag:</i> Dúsított uránrudak ($\\text{}^{235}_{\\phantom{}92}\\text{U}$).<br>
        2. <i>Moderátor:</i> Víz vagy grafit. Feladata a hasadásból kilépő gyors neutronok lelassítása, mivel a lassú neutronok sokkal nagyobb valószínűséggel váltanak ki újabb hasadást.<br>
        3. <i>Szabályozórudak:</i> Kadmium vagy bór tartalmú rudak, melyek kiváló neutronnyelők. Be- és kitolásukkal szabályozzák a reaktor teljesítményét.<br>
        4. <i>Hűtőközeg:</i> Elszállítja a hőt a gőzfejlesztőhöz, ami meghajtja a villamos energiát termelő turbinákat.
      </div>
      <div class="block app">
        <div class="step-label">Szabályozatlan folyamatok és nukleáris fegyverek</div>
        • <b>Atombomba (Fissziós fegyver):</b> Ha tiszta $\\text{}^{235}_{\\phantom{}92}\\text{U}$ vagy plutónium $\\text{}^{239}_{\\phantom{}94}\\text{Pu}$ üzemanyagból hirtelen összehozzák a <b>kritikus tömeget</b>, a multiplikációs tényező $k > 1$ lesz. A láncreakció a másodperc milliomod része alatt lavinaszerűen lefut, pusztító robbanást okozva.<br>
        • <b>Hidrogénbomba (Fúziós fegyver):</b> Könnyű magok, mint a deutérium ($\\text{}^{2}_{\\phantom{}1}\\text{H}$) és a trícium ($\\text{}^{3}_{\\phantom{}1}\\text{H}$) héliummaggá történő egyesülésén alapul: $\\text{}^{2}_{\\phantom{}1}\\text{H} + \\text{}^{3}_{\\phantom{}1}\\text{H} \\rightarrow \\text{}^{4}_{\\phantom{}2}\\text{He} + \\text{n}$. A pozitív magok közötti Coulomb-taszítás legyőzéséhez rendkívül nagy nyomás és több tízmillió Kelvines hőmérséklet kell, ezért a hidrogénbomba gyújtószerkezete egy hagyományos atombomba.
      </div>`
  }
];

const tocContainer = document.getElementById('toc');
const contentContainer = document.getElementById('content-container');

// A tartalom generálása és a tartalomjegyzék felépítése egyszerre
sections.forEach(s => {
  // Tartalomjegyzék elem
  const li = document.createElement('li');
  li.className = 'toc-item';
  li.innerHTML = `<a href="#section-${s.id}"><span class="dot"></span>${s.title}</a>`;
  tocContainer.appendChild(li);

  // Teljes elméleti blokk
  const sectionElement = document.createElement('section');
  sectionElement.className = 'section-card';
  sectionElement.id = 'section-' + s.id;
  sectionElement.innerHTML = `
    <h2 class="section-title">${s.title}</h2>
    <div>${s.content}</div>
  `;
  contentContainer.appendChild(sectionElement);
});

// MathJax renderelés indítása az aszinkron betöltés után
window.addEventListener('load', () => {
  if (typeof MathJax !== 'undefined') {
    MathJax.typesetPromise([contentContainer]);
  }
});
</script>
