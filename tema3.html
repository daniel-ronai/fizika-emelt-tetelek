        <div class="step-label">A nyomás fogalma, a hidrosztatikai nyomás és Pascal törvénye</div>
        • <b>A nyomás fogalma:</b> A nyomóerő ($F_{\\text{ny}}$) és a nyomott felület ($A$) nagyságának aránya. Skaláris mennyiség, amely a felület minden pontjára merőlegesen hat:
        $$p = \\frac{F_{\\text{ny}}}{A} \\quad \\left[ \\text{Egysége: Pascal (Pa) } = \\frac{\\text{N}}{\\text{m}^2} \\right]$$
        • <b>Hidrosztatikai nyomás:</b> A folyadékok és gázok súlyából származó nyomás. Egy $d_{\\text{f}}$ sűrűségű, homogén folyadékoszlop alján a felszíntől mért $h$ mélységben ható nyomás értéke a folyadékoszlop súlyának ($G = m \\cdot g = d_{\\text{f}} \\cdot V \\cdot g = d_{\\text{f}} \\cdot A \\cdot h \\cdot g$) levezetéséből adódik:

        Ha egy testet folyadékba vagy gázba merítünk, rá a környező közeg felfelé mutató <b>felhajtóerőt</b> ($F_{\\text{f}}$) fejt ki. <br><br>
        <i>Matematikai levezetés (hasáb alakú testre):</i> Vegyünk egy $A$ alapfelületű, $l$ magasságú hasábot $d_{\\text{f}}$ sűrűségű folyadékban. A hasáb teteje $h_1$ mélységben van, ott a felülről ható nyomóerő: $F_1 = p_1 \\cdot A = d_{\\text{f}} \\cdot g \\cdot h_1 \\cdot A$. A hasáb alja $h_2 = h_1 + l$ mélységben van, ott az alulról felfelé ható nyomóerő: $F_2 = p_2 \\cdot A = d_{\\text{f}} \\cdot g \\cdot (h_1 + l) \\cdot A$. Az oldallapokra ható erők szimmetrikusan kioltják egymást. Az eredő függőleges erő a felhajtóerő:
        $$F_{\\text{f}} = F_2 - F_1 = d_{\\text{f}} \\cdot g \\cdot A \\cdot (h_1 + l) - d_{\\text{f}} \\cdot g \\cdot A \\cdot h_1 = d_{\\text{f}} \\cdot g \\cdot A \\cdot l = d_{\\text{f}} \\cdot g \\cdot V_{\\text{b}}$$
        Ahol $V_{\\text{b}} = A \\cdot l$ a test folyadékba merülő részének térfogata. Ebből következik <b>Arkhimédész törvénye</b>: Minden folyadékba vagy gázba merülő testre felfelé mutató felhajtóerő hat, amelynek nagysága megegyezik a test által kiszorított közeg súlyával.<br><br>

        <div class="step-label">Az üvegházhatás és az ózonpajzs fizikai mechanizmusa</div>
        • <b>Az üvegházhatás fizikai alapja:</b> A Nap felszíni hőmérséklete magas (kb. $5700 \\, \\text{K}$), ezért a Wien-féle eltolódási törvény értelmében a belőle érkező sugárzás maximuma a rövid hullámhosszú, nagy energiájú <b>látható fény</b> tartományába esik. A légkör a látható fény számára átlátszó, így az eléri a Föld felszínét és felmelegíti azt. A felmelegedett Föld felszíne viszont sokkal alacsonyabb hőmérsékletű (kb. $288 \\, \\text{K}$), így ő maga hosszú hullámhosszú, kis energiájú <b>infravörös (hő-) sugárzást</b> bocsát ki a világűr felé. A légkörben jelen lévő <b>üvegházhatású gázok</b> (vízgőz $\\text{H}_2\\text{O}$, szén-dioxid $\\text{CO}_2$, metán $\\text{CH}_4$) molekulái szerkezetükből adódóan elnyelik (abszorbeálják) ezt az infravörös sugárzást, gerjesztett állapotba kerülnek, majd a kisugárzott energia jelentős részét minden irányban – így visszatérően a Föld felszíne felé is – újrasugározzák. <i>Ez a természetes folyamat biztosítja, hogy a Föld átlaghőmérséklete $+15^\\circ\\text{C}$ a gázok nélküli $-18^\\circ\\text{C}$ helyett, vagyis az élet feltétele.</i><br><br>
        • <b>Az ózonpajzs szerepe és bomlása:</b> Az ózonréteg a sztratoszférában (kb. $15-30 \\, \\text{km}$ magasságban) található, ahol a háromatomos oxigénmolekulák ($\\text{O}_3$) magas koncentrációban vannak jelen. Fizikai szerepe a Napból érkező, roncsoló hatású, nagy energiájú <b>ultraibolya (főként UV-B és UV-C) sugárzás</b> elnyelése, megvédve az élő szervezetek DNS-szerkezetét. A mesterségesen kibocsátott halogénezett szénhidrogének (CFC gázok / freonok) a magasban az UV sugárzás hatására klórgyökökre bomlanak, amelyek katalizátorként, láncreakcióban bontják le az ózonmolekulákat egyszerű oxigénné ($\\text{O}_2$), létrehozva az ózonlyukat.
      </div>
      <div class="block app">
        <div class="step-label">Épített környezetünk, éghajlat és globális klímaváltozás</div>
        • <b>Épített környezet és időjárás (Városi hősziget):</b> A nagyvárosok beton- és aszfaltfelületeinek alacsony az albedója (fényvisszaverő képessége), ezért több napsugárzást nyelnek el, mint a természetes zöldfelületek, emellett a burkolt felületek miatt elmarad a hűtő hatású párolgás. Ez, kiegészülve az ipari és közlekedési hőkibocsátással, kialakítja a városi hősziget jelenséget, ahol a városok hőmérséklete fokokkal magasabb a környezeténél.<br><br>
        • <b>Globális éghajlatváltozás:</b> Az ipari forradalom óta a fosszilis tüzelőanyagok (szén, kőolaj, földgáz) égetése és az erdőirtások miatt a légköri $\\text{CO}_2$ koncentráció drasztikusan megemelkedett. Ez felerősítette az üvegházhatást, megbontva a Föld globális sugárzási energiamérlegét. <br><br>
        <b>Következményei a fizikai rendszerekre:</b> A globális átlaghőmérséklet emelkedése, a sarki jégsapkák és gleccserek olvadása (ami csökkenti a Föld albedóját, pozitív visszacsatolással tovább gyorsítva a melegedést), a tengerszint emelkedése a hőtágulás és az olvadékvíz miatt, valamint a szélsőséges időjárási események (aszályok, heves viharok, hurrikánok) gyakoriságának és intensivításának növekedése a légkör megnövekedett belső energiája miatt.
      </div>`
  }
];

const tocContainer = document.getElementById('toc');
const contentContainer = document.getElementById('content-container');

// A tartalom generálása és a tartalomjegyzék felépítése egyszerre
sections.forEach(s => {
  // Tartalomjegyzék elem
  const li = document.createElement('li');
  li.className = 'toc-item';
  li.innerHTML = `<a href="#section-${s.id}"><span class="dot"></span>${s.title}</a>`;
  tocContainer.appendChild(li);

  // Teljes elméleti blokk
  const sectionElement = document.createElement('section');
  sectionElement.className = 'section-card';
  sectionElement.id = 'section-' + s.id;
  sectionElement.innerHTML = `
    <h2 class="section-title">${s.title}</h2>
    <div>${s.content}</div>
  `;
  contentContainer.appendChild(sectionElement);
});

// MathJax renderelés indítása az aszinkron betöltés után
window.addEventListener('load', () => {
  if (typeof MathJax !== 'undefined') {
    MathJax.typesetPromise([contentContainer]);
  }
});
</script>
