      <div class="block def">

        - <i>Grafikus leírás:</i> A sebesség-idő (v-t) grafikon a t-tengellyel párhuzamos egyenes, a grafikon alatti terület megadja a megtett utat (s = v * t). A hely-idő (x-t) grafikon egyenes, amelynek meredeksége megegyezik a sebességgel.

        $$a = \\frac{\\Delta v}{\\Delta t} = \\frac{v_t - v_0}{t} \\quad \\left[ \\text{Egysége: } \\frac{\\text{m}}{\\text{s}^2} \\right]$$

        - <i>Kerületi sebesség (<b>v</b>):</i> v = &omega; * r<br>

        $$a(t) = -\\omega^2 \\cdot x$$
        A gyorsulás tehát minden pillanatban egyenesen arányos a kitéréssel, de azzal ellentétes irányú (mindig az egyensúlyi középpont felé mutat).

        $$T = 2\\pi \\cdot \\sqrt{\\frac{m}{D}}$$
        • <b>A rezgő test energiája:</b> Súrlódásmentes rendszerben a mozgási energia és a rugalmas helyzeti energia összege állandó, értéke a maximális kitérésnél mérhető energiával egyenlő: E = 0.5 * D * A<sup>2</sup>.<br><br>

        • <b>3. Lejtő:</b> Függőleges emelés helyett a testet egy síkon csúsztatjuk fel. A szükséges minimális húzóerő a súly lejtőirányú komponense, ami lényegesen kisebb, mint a test súlya, ha a lejtő hajlásszöge kicsi.

    content: `
      <div class="block def">
        <div class="step-label">A tehetetlenségi nyomaték és a forgásdinamika alaptörvénye</div>
        • <b>Tehetetlenségi nyomaték (I):</b> A merev test forgási tehetetlenségének mértéke egy adott forgástengelyre vonatkozóan. Függ a test tömegétől és a tömeg tengelytől való távolsági eloszlásától:
        $$I = \\sum m_i \\cdot r_i^2 \\quad \\left[ \\text{kg} \\cdot \\text{m}^2 \\right]$$
        • <b>A forgómozgás dinamikai alaptörvénye:</b> A Newton II. törvényének forgási megfelelője. A merev testre ható külső forgatónyomatékok eredője egyenesen arányos a test szöggyorsulásával (&beta;), az arányossági tényező pedig a tehetetlenségi nyomaték:
        $$M_{\\text{eredő}} = I \\cdot \\beta$$

      <div class="block thm">

        • <b>Perdület (Impulzusmomentum, L):</b> A forgómozgásban lévő test forgási tehetetlenségének és forgási szögsebességének szorzata:
        $$L = I \\cdot \\omega \\quad \\left[ \\text{J} \\cdot \\text{s} \\right]$$
        • <b>A perdületmegmaradás törvénye:</b> Ha a merev testre vagy rendszerre ható külső forgatónyomatékok eredője zéró, akkor a rendszer összes perdülete az időben állandó marad:
        $$I_1 \\cdot \\omega_1 = I_2 \\cdot \\omega_2 = \\text{állandó}$$
        • <b>Gyakorlati alkalmazás (A piruettező műkorcsolyázó):</b> Amikor a forgó műkorcsolyázó behúzza a karjait a törzséhez, a testének tömege közelebb kerül a forgástengelyhez. Emiatt a tehetetlenségi nyomatéka drasztikusan lecsökken. Mivel külső forgatónyomaték nem hat rá, a perdületének meg kell maradnia. A csökkenő tehetetlenségi nyomatékot a szögsebesség automatikus, látványos növekedése kompenzálja, vagyis a korcsolyázó rendkívüli módon felgyorsul.

const tocContainer = document.getElementById('toc');
const contentContainer = document.getElementById('content-container');

// A tartalom generálása és a tartalomjegyzék felépítése egyszerre
sections.forEach(s => {
  // Tartalomjegyzék elem
  const li = document.createElement('li');
  li.className = 'toc-item';
  li.innerHTML = `<a href="#section-${s.id}"><span class="dot"></span>${s.title}</a>`;
  tocContainer.appendChild(li);

  // Teljes elméleti blokk
  const sectionElement = document.createElement('section');
  sectionElement.className = 'section-card';
  sectionElement.id = 'section-' + s.id;
  sectionElement.innerHTML = `
    <h2 class="section-title">${s.title}</h2>
    <div>${s.content}</div>
  `;
  contentContainer.appendChild(sectionElement);
});

// MathJax renderelés indítása az aszinkron betöltés után
window.addEventListener('load', () => {
  if (typeof MathJax !== 'undefined') {
    MathJax.typesetPromise([contentContainer]);
  }
});
