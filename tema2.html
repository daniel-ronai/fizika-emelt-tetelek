        - <i>Szilárd:</i> Határozott alak és térfogat. A részecskék rögzített rácspontok körül végeznek kis amplitúdójú rezgőmozgást. Erős kohéziós erők.<br>
        - <i>Cseppfolyós (Folyadék):</i> Határozott térfogat, de változó, az edény alakját felvevő forma. A részecskék egymáson gördülnek, szoros közelségben vannak, de nincs távolsági rend.<br>
        - <i>Légnemű (Gáz/Gőz):</i> Nincs se határozott alakja, se térfogata; kitölti a rendelkezésre álló teret. A részecskék közötti távolság nagy, egymástól függetlenül, szabadon repülnek az ütközések között.<br>
        • <b>Gáz, gőz és telített gőz fogalma:</b> A gőz olyan légnemű anyag, amelynek hőmérséklete a kritikus hőmérséklet alatt van, így tiszta összenyomással (hűtés nélkül) is cseppfolyósítható. A **telített gőz** dinamikus egyensúlyban van a saját folyadékával egy zárt térben: időegység alatt pontosan ugyanannyi molekula lép ki a folyadékból (párolgás), mint amennyi visszatér oda (kondenzáció). A telített gőz nyomása kizárólag a hőmérséklettől függ, a térfogattól független!<br>
        • <b>A folyamatok halmazállapot-változási állandói (Energetikai leírás):</b><br>
        Minden fázisátalakulás során a közölt vagy elvont hő nem a hőmérsékletet változtatja, hanem a részecskék közötti kötések felbontására vagy kialakítására fordítódik (a fázisátalakulás alatt a hőmérséklet **szigorúan állandó**).<br>
        1. <i>Olvadás és Fagyás:</i> $Q_{\\text{olv}} = L_{\\text{olv}} \\cdot m$, ahol $L_{\\text{olv}}$ az olvadáshő ($[\\text{J/kg}]$). Az olvadáspont függ a külső nyomástól: a táguló anyagoknál a nyomás növelése emeli, a fázisváltáskor összehúzódó anyagoknál (pl. jég) a nyomás növelése *csökkenti* az olvadáspontot (ezért csúszik a korcsolya).<br>
        2. <i>Párolgás és Forrás:</i> A párolgás minden hőmérsékleten, de csak a folyadék felszínén történik. A **forrás** egy kritikus forrásponton következik be, amikor a folyadék belsejében lévő gőzbuborékok telített gőznyomása eléri a külső légnyomást, így a buborékok fel tudnak fúvódni és a fázisváltás a folyadék teljes térfogatában megindul. Szükséges hőmennyiség: $Q_{\\text{forr}} = L_{\\text{forr}} \\cdot m$, ahol $L_{\\text{forr}}$ a forráshő. A külső nyomás növelése (pl. Kukta edény) emeli a forráspontot, így az étel gyorsabban megfő; míg kis nyomáson (pl. magas hegyeken) a víz $100^{\\circ}\\text{C}$ alatt forr fel.<br>
        3. <i>Szublimáció:</i> A szilárd fázisból az anyag közvetlenül légnemű fázisba lép át a folyadékállapot kihagyásával (pl. szárazjég $\\text{CO}_2$, jód, kámfor). Szükséges energia a szublimációs hő: $Q_{\\text{szub}} = L_{\\text{szub}} \\cdot m$.
      </div>`
  }
];

const tocContainer = document.getElementById('toc');
const contentContainer = document.getElementById('content-container');

// A tartalom generálása és a tartalomjegyzék felépítése egyszerre
sections.forEach(s => {
  // Tartalomjegyzék elem
  const li = document.createElement('li');
  li.className = 'toc-item';
  li.innerHTML = `<a href="#section-${s.id}"><span class="dot"></span>${s.title}</a>`;
  tocContainer.appendChild(li);

  // Teljes elméleti blokk
  const sectionElement = document.createElement('section');
  sectionElement.className = 'section-card';
  sectionElement.id = 'section-' + s.id;
  sectionElement.innerHTML = `
    <h2 class="section-title">${s.title}</h2>
    <div>${s.content}</div>
  `;
  contentContainer.appendChild(sectionElement);
});

// MathJax renderelés indítása az aszinkron betöltés után
window.addEventListener('load', () => {
  if (typeof MathJax !== 'undefined') {
    MathJax.typesetPromise([contentContainer]);
  }
});
</script>
