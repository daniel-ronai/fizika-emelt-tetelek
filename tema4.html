      <div class="block def">
        <div class="step-label">Elektrosztatikai alapjelenségek és a Coulomb-törvény</div>
        • <b>Elektromos töltés:</b> Az anyagok alapvető tulajdonsága. Kétféle töltés létezik: pozitív és negatív. Azonos előjelűek taszítják, ellentétes előjelűek vonzzák egymást. A töltés kvantált (az elemi töltés, $e \\approx 1{,}602 \\cdot 10^{-19} \\, \\text{C}$ egész számú többszöröse) és zárt rendszerben érvényes a <i>töltésmegmaradás törvénye</i>.<br>
        • <b>Coulomb-törvénye:</b> Két pontszerű, nyugalomban lévő $Q_1$ és $Q_2$ elektromos töltés között ható erő egyenesen arányos a töltések nagyságának szorzatával, és fordítottan arányos a közöttük lévő $r$ távolság négyzetével:
        $$F_{\\text{C}} = k \\cdot \\frac{|Q_1 \\cdot Q_2|}{r^2}$$
        Ahol $k$ az elektrosztatikai állandó. Vákuumban (és jó közelítéssel levegőben):
        $$k = \\frac{1}{4\\pi \\varepsilon_0} \\approx 8{,}988 \\cdot 10^9 \\, \\frac{\\text{N} \\cdot \\text{m}^2}{\\text{C}^2}$$

        • <b>Elektromos térerősség (Vektoriális jellemzés):</b> A mező egy adott pontjába helyezett pozitív $q$ próbanyomatékra ható elektromos erő és a töltés nagyságának aránya:
        $$\\vec{E} = \\frac{\\vec{F}}{q} \\quad \\left[ \\text{Egysége: } \\frac{\\text{N}}{\\text{C}} = \\frac{\\text{V}}{\\text{m}} \\right]$$
        Ponttöltés mezejében a térerősség: $E = k \\cdot Q / r^2$. Grafikus ábrázolására az <b>erővonalakat</b> használjuk, amelyek iránya megegyezik a pozitív töltésre ható erő irányával, sűrűségük pedig arányos a mező térerősségével. Szabad töltésekből indulnak ki (pozitív) és töltéseken végződnek (negatív), vagy a végtelenbe nyúlnak (örvénymentes mező).<br>
        • <b>Elektromos potenciál (Skaláris jellemzés):</b> A mező egy pontjának energetikai állapota. Megadja az adott pontba helyezett egységnyi pozitív töltés rögzített viszonyítási ponthoz (többnyire a végtelenhez vagy a leföldelt ponthoz) viszonyított potenciális energiáját:
        $$U_{\\text{A}} = \\frac{E_{\\text{pot,A}}}{q} \\quad \\left[ \\text{Egysége: } \\text{V} = \\frac{\\text{J}}{\\text{C}} \\right]$$
        • <b>Elektromos feszültség:</b> Két pont (A és B) közötti potenciálkülönbség, ami megadja a mező által végzett munkát, miközben egységnyi pozitív töltést mozgat át A-ból B-be:
        $$U_{\\text{AB}} = U_{\\text{A}} - U_{\\text{B}} = \\frac{W_{\\text{AB}}}{q}$$
        • <b>Egyszerű elektrosztatikus térerők:</b><br>
        1. <i>Homogén mező:</i> A térerősségvektor a mező minden pontjában állandó nagyságú és irányú (pl. síkkondenzátor lemezei között). Itt a feszültség és térerősség kapcsolata: $U = E \\cdot d$, ahol $d$ a lemezek távolsága.<br>
        2. <i>Centrálisan szimmetrikus mező:</i> Ponttöltés vagy gömbszimmetrikus töltéseloszlás körül alakul ki, a térerősség a sugár mentén kifelé vagy befelé mutat, nagysága $1/r^2$ szerint csökken.

        A kondenzátor nagy mennyiségű elektromos töltés és energia tárolására szolgáló áramköri elem, amely legalább két, egymástól szigetelővel elválasztott vezető testből áll.<br>
        • <b>Kapacitás ($C$):</b> A kondenzátorra vitt $Q$ töltés és a lemezei között mérhető $U$ feszültség aránya, ami független a töltéstől és feszültségtől, csak a geometriától és a szigetelőtől függ:

        • <b>A feltöltött kondenzátor energiája:</b> A feltöltési folyamat során végzett munka elektromos mező energiájaként tárolódik el:
        $$W = E_{\\text{en}} = \\frac{1}{2} \\cdot Q \\cdot U = \\frac{1}{2} \\cdot C \\cdot U^2 = \\frac{1}{2} \\cdot \\frac{Q^2}{C}$$
      </div>
